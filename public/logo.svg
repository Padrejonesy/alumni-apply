<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="400" fill="#ffffff"/>
  
  <!-- Alumni text -->
  <text x="50" y="200" font-family="Arial Black, Arial, sans-serif" font-size="82" font-weight="900" fill="#f59e0b" stroke="#1e3a8a" stroke-width="3">Alumni</text>
  
  <!-- Tutoring text -->
  <text x="50" y="260" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#1e3a8a" letter-spacing="8px">TUTORING</text>
  
  <!-- TM symbol -->
  <text x="350" y="240" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1e3a8a">™</text>
  
  <!-- Graduation cap -->
  <g transform="translate(320, 120)">
    <!-- Cap diamond shape -->
    <path d="M 0 -15 L 20 0 L 0 15 L -20 0 Z" fill="#1e3a8a"/>
    <!-- Cap base -->
    <ellipse cx="0" cy="15" rx="22" ry="4" fill="#1e3a8a"/>
    <!-- Tassel -->
    <line x1="15" y1="0" x2="25" y2="-15" stroke="#f59e0b" stroke-width="2" stroke-linecap="round"/>
    <circle cx="25" cy="-15" r="3" fill="#f59e0b"/>
  </g>
</svg>